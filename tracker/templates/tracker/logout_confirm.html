{% extends 'tracker/base.html' %}

{% block title %}Confirm Log Out | MailPulse{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card text-center" style="max-width: 440px;">
        <div class="mb-4">
            <div class="empty-state-icon mb-3" style="background-color: rgba(239, 68, 68, 0.08); color: var(--danger-color); padding: 1.2rem; border-radius: 50%; display: inline-block;">
                <i class="bi bi-box-arrow-right fs-1"></i>
            </div>
            <h3 class="fw-bold text-white mb-2" style="font-family: var(--font-heading);">Confirm Log Out</h3>
            <p class="text-muted">Are you sure you want to sign out of your MailPulse tracking session?</p>
        </div>
        
        <form method="post" action="{% url 'tracker:logout' %}">
            {% csrf_token %}
            
            <div class="d-flex flex-column gap-2">
                <button type="submit" class="btn btn-danger py-2 fw-semibold w-100" style="background-color: var(--danger-color); border: none; border-radius: 8px;">
                    <i class="bi bi-box-arrow-right me-2"></i>Yes, Log Out
                </button>
                <a href="{% url 'tracker:dashboard' %}" class="btn btn-glass-secondary py-2 w-100">
                    <i class="bi bi-arrow-left me-2"></i>Cancel & Return
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
